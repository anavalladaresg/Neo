version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
      - "priority: low"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
      - "priority: low"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
      - "area: ci"
      - "priority: low"
    commit-message:
      prefix: "chore(actions)"
