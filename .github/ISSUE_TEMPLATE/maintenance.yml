name: Maintenance task
description: Propose documentation, tooling, refactoring, infrastructure, or repository work
title: "[Maintenance]: "
labels:
  - "type: chore"
body:
  - type: dropdown
    id: kind
    attributes:
      label: Task type
      options:
        - Chore
        - Documentation
        - Refactor
        - Testing
        - Continuous integration
        - Release engineering
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the maintenance need and current risk or friction.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List the focused changes included.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out-of-scope items
      description: List adjacent work excluded from this task.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation and testing
      description: List exact checks or tests expected for completion.
    validations:
      required: true
  - type: textarea
    id: documentation
    attributes:
      label: Documentation impact
      description: Identify documentation changes or state why none are needed.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and rollback
      description: Describe compatibility, data, CI, release, or contributor risks and how to recover.
    validations:
      required: true
