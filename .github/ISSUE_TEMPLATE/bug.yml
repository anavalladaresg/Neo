name: Bug report
description: Report a reproducible defect or regression
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Neo safer. Remove personal data, credentials, real veterinary documents, and private photographs from every field and attachment.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and its impact concisely.
      placeholder: Neo fails to preserve the previous profile file when...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Neo version or commit, Windows version, architecture, and relevant tool versions.
      placeholder: |
        Neo: 0.1.0-alpha.1
        Windows: Windows 11 24H2 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest deterministic sequence that reproduces the problem.
      placeholder: |
        1. Create an example workspace.
        2. Open the profile form.
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — data loss, security boundary failure, or application unusable
        - High — core flow blocked with no reasonable workaround
        - Medium — degraded behaviour with a workaround
        - Low — minor or cosmetic impact
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Relevant logs or screenshots
      description: Paste sanitized logs or drag sanitized screenshots here. State "None" if unavailable.
    validations:
      required: true
  - type: input
    id: suspected-area
    attributes:
      label: Suspected area
      description: Name the likely feature, module, or boundary if known.
      placeholder: Workspace atomic write boundary
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable conditions that prove the defect is fixed safely.
      placeholder: |
        - [ ] A regression test fails before the fix and passes afterward.
        - [ ] The previous valid file remains intact when replacement fails.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Reporter checks
      options:
        - label: I searched for an existing issue.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
