name: Feature request
description: Propose a focused, testable product capability
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the user problem without prescribing an implementation prematurely.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: User value
      description: Explain who benefits and what outcome improves.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List the smallest complete vertical slice.
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out-of-scope items
      description: State adjacent work that this issue deliberately excludes.
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use observable, testable checklist items.
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: Testing expectations
      description: Identify appropriate unit, component, integration, Rust, accessibility, or end-to-end coverage.
    validations:
      required: true
  - type: textarea
    id: documentation
    attributes:
      label: Documentation expectations
      description: Identify documents, ADRs, schemas, or release notes that must change.
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Architecture constraints
      options:
        - label: This proposal preserves offline operation and introduces no implicit network dependency.
          required: true
        - label: This proposal stores no personal binary data inside JSON.
          required: true
        - label: I searched for an existing issue.
          required: true
