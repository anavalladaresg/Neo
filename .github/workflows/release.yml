name: Release candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate and package
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22.14.0"

jobs:
  windows-release-candidate:
    name: Windows release candidate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out requested ref
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up stable Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: release-candidate

      - name: Install frontend dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript
        run: npm run typecheck

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Clippy with warnings denied
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Build Windows installers
        run: npm run tauri build

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neo-windows-release-candidate-${{ github.run_number }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 14
